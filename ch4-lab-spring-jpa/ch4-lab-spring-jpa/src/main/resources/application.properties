spring.application.name=ch4-lab-spring-jpa
# CẤU HÌNH KẾT NỐI CSDL (DataSource)
# ===================================================================
# 1. URL kết nối JDBC đến MySQL
#    - localhost:3306 là địa chỉ và cổng mặc định của MySQL Server
#    - gdu_jpa_lab là tên database vừa tạo
spring.datasource.url=jdbc:mysql://localhost:3306/gdu_jpa_lab?
allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
# 2. Tài khoản đăng nhập MySQL
spring.datasource.username=root
spring.datasource.password=Admin@123
# 3. Driver kết nối MySQL (có thể bỏ qua ở Spring Boot 3.x vì tự phát hiện)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CẤU HÌNH JPA / HIBERNATE
# ===================================================================
# 4. Hiển thị câu lệnh SQL được Hibernate tự động sinh ra trên console
spring.jpa.show-sql=true
# 5. Định dạng câu lệnh SQL cho dễ đọc (xuống dòng, thụt lề)
spring.jpa.properties.hibernate.format_sql=true
# 6. Chỉ định Dialect của MySQL 8 để Hibernate sinh SQL đúng cú pháp
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# 7. Chế độ tự động sinh/cập nhật bảng từ Entity Class
#    - update: Cập nhật bảng theo Entity, giữ nguyên dữ liệu cũ (dùng cho
Development)
spring.jpa.hibernate.ddl-auto=update